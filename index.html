<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>게임 모음</title>
  <style>
    :root { --bg:#10141c; --card:#1b2330; --card-hi:#243044; --line:#2e3a4f; --txt:#e8edf5; --sub:#90a0b8; --accent:#f0c64a; }
    * { box-sizing: border-box; }
    html, body { margin:0; height:100%; }
    body {
      font-family: "Segoe UI", "Malgun Gothic", system-ui, sans-serif;
      background: radial-gradient(1200px 700px at 50% -10%, #1a2434 0%, var(--bg) 60%);
      color: var(--txt); min-height:100%;
      display:flex; flex-direction:column; align-items:center; padding: 64px 20px 48px;
    }
    header { text-align:center; margin-bottom: 40px; }
    h1 { margin:0; font-size: 38px; letter-spacing: 1px; }
    header p { margin: 10px 0 0; color: var(--sub); font-size: 15px; }
    .grid {
      display:grid; gap: 22px; width:100%; max-width: 880px;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    }
    a.game {
      display:block; text-decoration:none; color:inherit;
      background: var(--card); border:1px solid var(--line); border-radius: 16px;
      padding: 26px 26px 22px; transition: transform .12s ease, background .12s ease, border-color .12s ease;
    }
    a.game:hover { transform: translateY(-4px); background: var(--card-hi); border-color: var(--accent); }
    .game .badge {
      display:inline-block; font-size: 12px; font-weight:700; letter-spacing:.5px;
      padding: 4px 10px; border-radius: 999px; margin-bottom: 14px;
      background: rgba(240,198,74,.14); color: var(--accent); border:1px solid rgba(240,198,74,.35);
    }
    .game h2 { margin: 0 0 8px; font-size: 24px; }
    .game p { margin: 0; color: var(--sub); font-size: 14px; line-height: 1.55; }
    .game .play { margin-top: 18px; font-size: 14px; font-weight:700; color: var(--accent); display:flex; align-items:center; gap:6px; }
    footer { margin-top: 44px; color: #56627a; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>게임 모음</h1>
    <p>플레이할 게임을 선택하세요</p>
  </header>

  <main class="grid">
    <a class="game" href="GoldenGame/index.html">
      <span class="badge">싱글</span>
      <h2>GoldenGame</h2>
      <p>망치를 지형에 걸어 위로 위로! Getting Over It 스타일 클라이밍. 마우스로 망치 조준, R로 리셋·캐릭터 변경.</p>
      <div class="play">▶ 플레이</div>
    </a>

    <a class="game" href="ZomGodot/index.html">
      <span class="badge">싱글</span>
      <h2>ZomDef</h2>
      <p>당신의 뇌는 반쯤 썩었습니다! 무작정 달려들지 마시고 오래 생존하세요.</p>
      <div class="play">▶ 플레이</div>
    </a>
  </main>
</body>
</html>
