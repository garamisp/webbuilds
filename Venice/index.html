<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0e1530" />
  <title>타자 아레나</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <!-- 메인 게임 영역 -->
    <section id="stage">
      <div id="topbar">
        <div class="badge" id="modeBadge">혼자</div>
        <div class="stat"><span class="k">LV</span><b id="levelVal">1</b></div>
        <div class="stat"><span class="k">SCORE</span><b id="scoreVal">0</b></div>
        <button id="skillBtn" class="skill" disabled title="단어 발사 (Tab)">
          <span class="ic">⚡</span><span class="lab">발사</span><span class="cnt" id="skillCount">0</span>
          <span class="bar"><i id="skillBar"></i></span>
        </button>
        <div id="hearts" class="hearts" aria-label="라이프"></div>
      </div>

      <div id="canvasWrap">
        <canvas id="game"></canvas>
        <div id="toast" class="toast"></div>
        <div id="typeRow">
          <span id="typePrompt">▶</span>
          <input id="typeInput" type="text" autocomplete="off" autocorrect="off"
                 autocapitalize="off" spellcheck="false" placeholder="떨어지는 단어를 입력!" />
        </div>
      </div>
    </section>

    <!-- 사이드바: 상대 화면 + 채팅 -->
    <aside id="side">
      <div class="side-head">
        <span id="netDot" class="dot off"></span>
        <span id="netLabel">오프라인 (혼자)</span>
      </div>
      <div id="opponents" class="opponents"></div>
      <div id="chatBox" class="chatbox">
        <div id="chatLog" class="chatlog"></div>
        <input id="chatInput" type="text" maxlength="120" placeholder="채팅… (Enter)" />
      </div>
    </aside>
  </div>

  <!-- 시작 화면 -->
  <div id="startOverlay" class="overlay">
    <div class="panel">
      <h1>타자 <span>아레나</span></h1>
      <p class="tag">하늘에서 떨어지는 단어를 입력해 파괴하라.<br/>바닥에 닿으면 도시가 한 칸씩 수몰된다.<br/>대결에선 마지막까지 살아남아 계속 도전자를 받아쳐라.</p>

      <label class="fld">
        <span>닉네임</span>
        <input id="nickInput" type="text" maxlength="12" value="" placeholder="플레이어" />
      </label>

      <div class="fld">
        <span>언어</span>
        <div class="seg" id="langSeg">
          <button data-lang="ko" class="on">한국어</button>
          <button data-lang="en">English</button>
        </div>
      </div>

      <div class="fld">
        <span>모드</span>
        <div class="seg" id="modeSeg">
          <button data-mode="public" class="on">공개 (대결 매칭)</button>
          <button data-mode="private">비공개 (혼자 레벨업)</button>
        </div>
      </div>

      <button id="startBtn" class="primary">시작</button>
      <p class="hint">공개로 시작하면 혼자 플레이 중 다른 사람이 들어오면<br/>레벨이 초기화되며 자동으로 대결이 시작됩니다.</p>
    </div>
  </div>

  <!-- 게임오버 / 결과 -->
  <div id="overOverlay" class="overlay hidden">
    <div class="panel">
      <h1 id="overTitle">게임 오버</h1>
      <p class="tag" id="overSub"></p>
      <div class="result">
        <div><span>점수</span><b id="overScore">0</b></div>
        <div><span>레벨</span><b id="overLevel">1</b></div>
      </div>
      <button id="restartBtn" class="primary">다시 도전 (Enter)</button>
    </div>
  </div>

  <!-- 스페셜 스킬: 단어 발사 -->
  <div id="skillModal" class="skill-modal hidden">
    <div class="sm-card">
      <div class="sm-title">⚡ 단어 발사</div>
      <div class="sm-sub">모두에게 떨어뜨릴 단어 — <b>나에게도 떨어진다!</b><br/>최대 10자, 공백 없이 (말 안 되는 단어도 OK)</div>
      <input id="skillInput" type="text" maxlength="10" autocomplete="off" autocorrect="off"
             autocapitalize="off" spellcheck="false" placeholder="예: 우갸갸갹" />
      <div class="sm-hint" id="skillHint"></div>
      <div class="sm-btns">
        <button id="skillCancel">취소 (Esc)</button>
        <button id="skillFire" class="primary">발사 (Enter)</button>
      </div>
    </div>
  </div>

  <script src="js/words.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/game.js"></script>
  <script src="js/net.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
